services:
  - type: web
    name: disertatie-python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # InfinityFree blocks remote MySQL, so the DB is reached through
      # components/python_bridge.php instead of a direct connection.
      - key: BRIDGE_URL
        sync: false   # e.g. https://yoursite.infinityfreeapp.com/components/python_bridge.php
      - key: BRIDGE_KEY
        sync: false   # must match PYTHON_BRIDGE_KEY in components/config.php
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: JOOBLE_API_KEY
        sync: false
