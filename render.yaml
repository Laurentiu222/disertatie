services:
  - type: web
    name: disertatie-python
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # This service is stateless and never touches the database directly —
      # PHP on InfinityFree does all DB reads/writes and calls this service
      # only for computation.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: JOOBLE_API_KEY
        sync: false
